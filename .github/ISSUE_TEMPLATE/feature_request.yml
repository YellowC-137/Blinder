name: ✨ 기능 제안
description: 신규 기능 / 개선 / 새 플랫폼 플러그인 제안
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: 어떤 문제를 해결하나요?
      description: 현재 워크플로의 어떤 마찰이 있는지
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 제안 내용
      description: 어떻게 해결되어야 하는지 (UX / API / CLI 옵션 등 가능한 한 구체적으로)
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 대안 / 검토한 다른 방법
      description: 우회로, 다른 도구, 수동 방법 등

  - type: dropdown
    id: scope
    attributes:
      label: 영향 범위
      options:
        - CLI 옵션
        - 플랫폼 플러그인 (기존)
        - 신규 플랫폼 플러그인
        - 패턴 / 탐지 정확도
        - 마스킹 / 복원
        - 문서 / DX
        - 기타
    validations:
      required: true

  - type: textarea
    id: example
    attributes:
      label: 사용 예 (mock 입출력)
      render: shell
