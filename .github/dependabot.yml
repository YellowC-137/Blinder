# Dependabot 자동 업데이트 — Blinder 의존성 보안 추적
# - npm: 주간
# - github-actions: 주간 (CI workflow 자체 업데이트)
# 보안도구이므로 patch/minor 자동 머지 보다 먼저 PR 리뷰 필수.

version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    commit-message:
      prefix: "deps"
      include: "scope"
    groups:
      tree-sitter:
        patterns:
          - "tree-sitter-*"
          - "web-tree-sitter"
    ignore:
      # 0.26+ 런타임은 tree-sitter-wasms 0.1.13 의 언어 wasm 을 로드 못 함
      # (dylink 메타데이터 비호환 — Language.load 전부 실패, AST 가 조용히 죽음).
      # tree-sitter-wasms 가 0.26 호환 빌드를 내면 이 ignore 제거.
      - dependency-name: "web-tree-sitter"
        versions: [">=0.26.0"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "ci"
